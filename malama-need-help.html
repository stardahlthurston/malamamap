<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mālama Map — Find Help</title>
<link rel="icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script defer src="scripts/share-card.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#3a7d5c;--sage-deep:#1c4a3a;--sage-light:#6ab98a;--sage-pale:#edf7f1;
  --blue:#2a6496;--blue-deep:#1a4a72;--blue-light:#5a9fd4;--blue-pale:#eaf3fb;
  --gold:#c9983a;--gold-pale:#fdf4e3;--purple:#7b5ea7;--purple-pale:#f3eeff;
  --cream:#fdf8f2;--text-dark:#1c1a18;--text-mid:#4a453f;--text-muted:#8a827a;
  --border:rgba(0,0,0,0.08);--red:#c0392b;--red-pale:#fdf0ee;
}
body{font-family:'Nunito',sans-serif;background:#f4f6f4;color:var(--text-dark);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--sage-deep);padding:0.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800;color:white;text-decoration:none;}
.topbar-back{font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.75);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color 0.2s;}
.topbar-back:hover{color:white;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:0.5rem;}
.topbar-btn{font-size:0.65rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:0.35rem 0.75rem;border-radius:100px;border:1.5px solid rgba(255,255,255,0.4);color:rgba(255,255,255,0.9);text-decoration:none;transition:all 0.2s;white-space:nowrap;}
.topbar-btn:hover{background:rgba(255,255,255,0.1);}
.topbar-btn.btn-add{background:rgba(255,255,255,0.12);}
.topbar-logo-img{height:28px;width:auto;margin-right:6px;vertical-align:middle;}
@media(max-width:600px){.topbar-btn{font-size:0.6rem;padding:0.3rem 0.6rem;}}

/* HERO BAR */
.hero-bar{background:var(--blue);padding:1.25rem 1.5rem;color:white;}
.hero-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;margin-bottom:0.25rem;}
.hero-sub{font-size:0.82rem;font-weight:500;color:white;font-weight:600;}

/* FILTER BAR */
.filter-bar{background:white;border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.06);padding:0.7rem 1.5rem;display:flex;align-items:center;gap:0.5rem;overflow-x:auto;scrollbar-width:none;position:sticky;top:48px;z-index:90;}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{font-size:0.72rem;font-weight:700;white-space:nowrap;padding:0.38rem 0.9rem;border-radius:100px;border:1.5px solid #ccc;background:white;color:var(--text-dark);font-weight:700;cursor:pointer;transition:all 0.18s;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.chip.active{border-color:var(--blue);background:var(--blue-pale);color:var(--blue-deep);}
.chip-divider{width:1px;height:20px;background:#eee;flex-shrink:0;}
.open-only{display:flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;color:var(--text-mid);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.open-only input{accent-color:var(--blue);width:14px;height:14px;}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:#f0f0ec;border-radius:100px;padding:3px;gap:2px;flex-shrink:0;}
.view-btn{font-size:0.68rem;font-weight:700;padding:0.3rem 0.75rem;border-radius:100px;border:none;cursor:pointer;transition:all 0.2s;color:var(--text-muted);background:transparent;display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;}
.view-btn svg{width:12px;height:12px;}
.view-btn.active{background:white;color:var(--blue-deep);box-shadow:0 1px 4px rgba(0,0,0,0.1);}

/* CONTENT */
.content{padding:1.25rem 1.5rem;max-width:900px;margin:0 auto;}

/* RESULT COUNT */
.result-count{font-size:0.82rem;font-weight:700;color:var(--text-muted);margin-bottom:1rem;}
.result-count span{color:var(--blue-deep);}

/* LIST CARDS */
.listing-card{display:block;background:white;border-radius:14px;border:1.5px solid var(--border);margin-bottom:0.85rem;overflow:hidden;cursor:pointer;transition:box-shadow 0.2s,border-color 0.2s;text-decoration:none;color:inherit;}
.listing-card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.09);border-color:rgba(42,100,150,0.3);}
.lc-stripe{height:5px;}
.lc-stripe.shelter{background:var(--blue);}
.lc-stripe.supply_station{background:var(--sage);}
.lc-header{padding:0.85rem 1rem 0.65rem;display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;}
.lc-name{font-size:0.92rem;font-weight:700;color:var(--text-dark);margin-bottom:3px;}
.lc-addr{font-size:0.74rem;font-weight:500;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
.lc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.pill{font-size:0.6rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:100px;white-space:nowrap;}
.pill-open{background:var(--sage-pale);color:var(--sage-deep);}
.pill-closed{background:#f0f0f0;color:#888;}
.pill-shelter{background:var(--blue-pale);color:var(--blue-deep);}
.pill-supply{background:var(--sage-pale);color:var(--sage-deep);}
.pill-medical{background:#fdf0ee;color:#c0392b;}
.pill-dropoff{background:var(--gold-pale);color:var(--gold-deep);}
.pill-event{background:#f3eef8;color:#7b5ea7;}
.pill-skills{background:#fef0e6;color:#d4580a;}
.lc-body{padding:0 1rem 0.85rem;}
.lc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.6rem;}
.lc-tag{font-size:0.67rem;font-weight:700;padding:3px 9px;border-radius:100px;background:#eaf3fb;color:#1a4a72;}
.lc-tag-accept{font-size:0.67rem;font-weight:700;padding:3px 9px;border-radius:100px;background:var(--gold-pale);color:var(--gold-deep);}
.lc-meta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.55rem;}
.lc-meta-item{display:flex;align-items:center;gap:4px;font-size:0.74rem;font-weight:600;color:var(--text-mid);}
.lc-notes{font-size:0.77rem;font-weight:500;color:var(--text-muted);line-height:1.55;margin-bottom:0.65rem;}
.lc-actions{display:flex;gap:0.5rem;flex-wrap:wrap;}
.lc-btn{font-size:0.68rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:0.38rem 0.85rem;border-radius:100px;border:1.5px solid currentColor;cursor:pointer;transition:all 0.18s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;}
.btn-dir{color:var(--blue);background:var(--blue-pale);border-color:var(--blue-light);}
.btn-dir:hover{background:var(--blue);color:white;}
.share-card-btn{width:100%;margin-top:0.6rem;padding:0.6rem;background:var(--blue-pale);color:var(--blue-deep);border:1.5px solid rgba(42,100,150,0.15);border-radius:10px;font-size:0.75rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.18s;}
.share-card-btn:hover{background:var(--blue);color:white;border-color:var(--blue);}

/* SHELTER EXTRAS */
.shelter-info{display:flex;gap:1rem;margin-bottom:0.55rem;flex-wrap:wrap;}
.shelter-badge{font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:100px;background:var(--blue-pale);color:var(--blue-deep);}

/* EMPTY STATE */
.empty{text-align:center;padding:4rem 1.5rem;color:var(--text-muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;color:var(--sage-deep);margin-bottom:0.5rem;}
.empty p{font-size:0.88rem;font-weight:500;margin-bottom:1.5rem;line-height:1.6;}
.empty-btn{display:inline-block;padding:0.65rem 1.5rem;background:var(--sage);color:white;border-radius:100px;font-size:0.82rem;font-weight:700;text-decoration:none;transition:background 0.2s;}
.empty-btn:hover{background:var(--sage-deep);}

/* MAP VIEW */
#mapView{display:none;height:calc(100vh - 160px);position:relative;}
#map{width:100%;height:100%;}
.map-sheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:white;border-radius:20px 20px 0 0;padding:0 1.25rem 2rem;max-height:55vh;overflow-y:auto;transform:translateY(105%);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);box-shadow:0 -4px 30px rgba(0,0,0,0.18);pointer-events:none;display:none;}
.map-sheet.open{transform:translateY(0);pointer-events:all;}
.sheet-top{display:flex;align-items:center;justify-content:center;padding:0.75rem 0 0.6rem;position:sticky;top:0;background:white;z-index:1;}
.sheet-top-handle{width:36px;height:4px;background:#ddd;border-radius:100px;}
.sheet-top-close{position:absolute;right:0;background:rgba(0,0,0,0.06);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--text-muted);font-size:1.1rem;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
.sheet-top-close:hover{background:rgba(0,0,0,0.12);}
.sheet-bar{height:4px;border-radius:4px;margin-bottom:0.85rem;}
.sheet-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:800;color:var(--text-dark);margin-bottom:0.25rem;padding-right:1rem;}
.sheet-addr{font-size:0.8rem;color:var(--text-muted);margin-bottom:0.55rem;}
.sheet-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.6rem;}
.sheet-notes{font-size:0.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:0.6rem;}
.sheet-btns{display:flex;gap:8px;margin-top:0.75rem;}
.sheet-btns a{flex:1;text-align:center;padding:0.65rem 0.5rem;border-radius:100px;font-size:0.82rem;font-weight:700;text-decoration:none;font-family:'Nunito',sans-serif;transition:opacity 0.15s;}
.sheet-btns a:hover{opacity:0.85;}

/* MOBILE SEE ALL */
.mobile-see-all{display:none;padding:0.6rem 1rem;background:var(--blue);text-align:center;}
.mobile-see-all a{color:white;font-size:0.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
@media(max-width:768px){.mobile-see-all{display:block;}.topbar-right{display:none !important;}}

/* MAP POPUP */
.map-popup-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.4);}
.map-popup-overlay.open{display:flex;align-items:flex-end;justify-content:center;}
.map-popup-card{background:white;border-radius:20px 20px 0 0;padding:1.25rem;max-width:500px;width:100%;max-height:70vh;overflow-y:auto;animation:popupSlide 0.25s ease;}
@keyframes popupSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.map-popup-card .popup-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted);}
.map-popup-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800;color:var(--text-dark);margin-bottom:0.4rem;}
.map-popup-addr{font-size:0.82rem;color:var(--text-muted);margin-bottom:0.5rem;}
.map-popup-hours{font-size:0.82rem;color:var(--text-mid);margin-bottom:0.6rem;}
.map-popup-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem;}
.map-popup-items span{font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:100px;background:var(--blue-pale);color:var(--blue-deep);}
.map-popup-btns{display:flex;gap:8px;margin-top:0.5rem;}
.map-popup-btns a{flex:1;text-align:center;padding:0.6rem;border-radius:100px;font-size:0.82rem;font-weight:700;text-decoration:none;font-family:'Nunito',sans-serif;}
.map-popup-btns .btn-primary{background:var(--blue);color:white;}
.map-popup-btns .btn-secondary{background:white;color:var(--blue);border:1.5px solid var(--blue);}

/* LOADING */
.loading{text-align:center;padding:4rem 2rem;color:var(--text-muted);}
.loading p{font-size:0.9rem;font-weight:600;margin-top:1rem;}
.spinner{width:36px;height:36px;border:3px solid rgba(42,100,150,0.15);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>

<div class="hero-bar">

  <a href="malama-requests.html" style="display:inline-block;margin-top:0.75rem;font-size:0.78rem;font-weight:700;color:white;background:rgba(255,255,255,0.2);padding:0.45rem 1rem;border-radius:100px;text-decoration:none;border:1.5px solid rgba(255,255,255,0.4);">📣 Post what you need →</a>

<div class="filter-bar">

      <svg viewBox="0 0 12 12" fill="none"><rect x="0" y="1" width="12" height="2" rx="1" fill="currentColor"/><rect x="0" y="5" width="12" height="2" rx="1" fill="currentColor"/><rect x="0" y="9" width="12" height="2" rx="1" fill="currentColor"/></svg>
      List
    </button>
    <button class="view-btn" onclick="switchView('map',this)">
      <svg viewBox="0 0 12 12" fill="none"><path d="M1 2.5l3.5 1.5v6L1 8.5V2.5zM4.5 4l3-1.5v6l-3 1.5V4zM7.5 2.5L11 4v6l-3.5-1.5V2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
      Map
    </button>

</div>

<div id="listView">
  <div class="content">
    <div class="loading" id="loading"><div class="spinner"></div><p>Finding resources near you…</p></div>
    <div style="position:relative;margin-bottom:1rem;">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;" width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="#8a827a" stroke-width="1.8"/><path d="M15 15l-3-3" stroke="#8a827a" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" id="listingSearch" placeholder="Search listings…" oninput="handleSearch(this.value)" style="width:100%;padding:0.65rem 1rem 0.65rem 2.25rem;border:1.5px solid rgba(0,0,0,0.1);border-radius:100px;font-size:0.88rem;font-family:'Nunito',sans-serif;background:white;color:#1a1a1a;box-sizing:border-box;outline:none;">

</div>

<div id="mapView">
  <div id="map"></div>
</div>
<div id="mapSheet" class="map-sheet"></div>

<script>
const SURL = 'https://wvplmqmqlnftlpyrqnle.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cGxtcW1xbG5mdGxweXJxbmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgyMDIsImV4cCI6MjA4OTc4NDIwMn0.r5GLgPk-xywtkQdrmTAFcKZny1-Wrh8b5YezAHmU9yU';
const sb = window.supabase.createClient(SURL, SKEY);

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const TYPE_COLORS = {shelter:'#2a6496',supply_station:'#3a7d5c',medical_assistance:'#c0392b',food_distribution:'#c05621'};
const TYPE_LABELS = {shelter:'🏠 Shelter',supply_station:'🛖 Supply Station',medical_assistance:'🏥 Medical Aid Station',skills_labor:'🔧 Skills & Labor',donation_dropoff:'📦 Donation Drop-off',volunteer_event:'🙋 Volunteers Needed',food_distribution:'🍱 Food Distribution'};

let allListings = [];
let filtered = [];
let activeFilter = 'all';
let searchQuery = '';
let map, markers = [];
let mapReady = false;

async function init() {
  const { data, error } = await sb.from('listings')
    .select('*')
    .eq('status', true)
    .order('created_at', { ascending: false });
  // Show: shelters, supply stations, medical, skills offering help,
  // AND any listing that gives out items (has GIVING: items)
  const filteredByDir = (data || []).filter(l => {
    if (['shelter','supply_station','medical_assistance','food_distribution'].some(t=>(l.type||'').split(',').map(s=>s.trim()).includes(t))) return true;
    if ((l.type||'').split(',').map(s=>s.trim()).includes('skills_labor') && (l.skills_direction === 'offering' || !l.skills_direction)) return true;
    if (Array.isArray(l.items) && l.items.some(i => i.startsWith('GIVING:'))) return true;
    return false;
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('resultCount').style.display = 'block';

  allListings = filteredByDir;
  applyFilters();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function isCurrentlyOpen(l) {
  if (!l.status) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  // Check event_dates array first (recurring events)
  if (l.event_dates && l.event_dates.length > 0) {
    return l.event_dates.some(e => {
      const d = e === 'ongoing' ? 'ongoing' : e.split('|')[0];
      if (d === 'ongoing') return true;
      return new Date(d + 'T00:00:00') >= today;
    });
  }
  // Fall back to single event_date
  if (l.event_date) {
    if (l.event_date === 'ongoing') return true;
    return new Date(l.event_date.split('|')[0] + 'T00:00:00') >= today;
  }
  if (l.expires_at) return new Date(l.expires_at) >= today;

  // No hours listed — can't determine, assume open
  if (!l.hours) return true;

  const hours = l.hours.toLowerCase().trim();

  // Always-open patterns
  if (/24\s*\/?\s*7|always\s*open|open\s*24/.test(hours)) return true;

  const now = new Date();
  const currentDay = now.getDay(); // 0=Sun, 1=Mon, ... 6=Sat
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  // Day name lookup
  const dayMap = {
    'sun':0,'sunday':0,'mon':1,'monday':1,'tue':2,'tues':2,'tuesday':2,
    'wed':3,'wednesday':3,'thu':4,'thur':4,'thurs':4,'thursday':4,
    'fri':5,'friday':5,'sat':6,'saturday':6
  };

  // --- Step 1: determine if today is an operating day ---
  let dayMatch = null; // null = couldn't determine

  if (/\bdaily\b|\bevery\s*day\b|\b7\s*days\b/.test(hours)) {
    dayMatch = true;
  } else if (/\bweekday/.test(hours)) {
    dayMatch = currentDay >= 1 && currentDay <= 5;
  } else if (/\bweekend/.test(hours)) {
    dayMatch = currentDay === 0 || currentDay === 6;
  } else {
    // Day ranges like "Mon-Fri", "Monday – Saturday"
    const rangeRx = /\b(sun(?:day)?|mon(?:day)?|tue(?:s(?:day)?)?|wed(?:nesday)?|thu(?:r(?:s(?:day)?)?)?|fri(?:day)?|sat(?:urday)?)\s*[-–—to]+\s*(sun(?:day)?|mon(?:day)?|tue(?:s(?:day)?)?|wed(?:nesday)?|thu(?:r(?:s(?:day)?)?)?|fri(?:day)?|sat(?:urday)?)\b/i;
    const rangeMatch = hours.match(rangeRx);
    if (rangeMatch) {
      const s = dayMap[rangeMatch[1].toLowerCase()];
      const e = dayMap[rangeMatch[2].toLowerCase()];
      if (s !== undefined && e !== undefined) {
        dayMatch = s <= e
          ? (currentDay >= s && currentDay <= e)
          : (currentDay >= s || currentDay <= e); // wraps (e.g. Fri-Mon)
      }
    }

    // Individual days like "Tue, Thu" or "Tuesday and Thursday"
    if (dayMatch === null) {
      const found = new Set();
      for (const [name, num] of Object.entries(dayMap)) {
        if (new RegExp('\\b' + name + '\\b', 'i').test(hours)) found.add(num);
      }
      if (found.size > 0) dayMatch = found.has(currentDay);
    }
  }

  // If we know today isn't an operating day, it's not open
  if (dayMatch === false) return false;

  // --- Step 2: check time range ---
  // Matches "9am-5pm", "9:00 AM - 5:00 PM", "9a-5p", "9 am – 5 pm"
  const timeRx = /(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?\s*[-–—to]+\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?/i;
  const timeMatch = hours.match(timeRx);
  if (timeMatch) {
    let sH = parseInt(timeMatch[1]);
    const sM = parseInt(timeMatch[2] || '0');
    const sPer = (timeMatch[3] || '').toLowerCase();
    let eH = parseInt(timeMatch[4]);
    const eM = parseInt(timeMatch[5] || '0');
    const ePer = (timeMatch[6] || '').toLowerCase();

    // Convert to 24-hour
    if (sPer.startsWith('p') && sH !== 12) sH += 12;
    if (sPer.startsWith('a') && sH === 12) sH = 0;
    if (ePer.startsWith('p') && eH !== 12) eH += 12;
    if (ePer.startsWith('a') && eH === 12) eH = 0;

    // No AM/PM given — infer (e.g. "9-5" → 9am-5pm)
    if (!sPer && !ePer && sH >= 1 && sH <= 12 && eH >= 1 && eH <= 12 && sH > eH) {
      eH += 12;
    }

    const startMin = sH * 60 + sM;
    const endMin = eH * 60 + eM;

    if (endMin > startMin) {
      if (currentMinutes < startMin || currentMinutes > endMin) return false;
    }
    // If end < start (overnight), don't filter — ambiguous
  }

  // Couldn't fully parse → safe default: show the listing
  return true;
}

function applyFilters() {
  const openOnly = document.getElementById('openOnly').checked;
  filtered = allListings.filter(l => {
    if (activeFilter !== 'all') {
      const types = (l.type||'').split(',').map(s=>s.trim());
      if (!types.includes(activeFilter)) return false;
    }
    if (openOnly && !isCurrentlyOpen(l)) return false;
    return true;
  });
  renderList();
  if (mapReady) renderMarkers();
}

function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  renderList();
}

function renderList() {
  const count = document.getElementById('resultCount');
  const container = document.getElementById('listingsContainer');
  let display = filtered;
  if (searchQuery) {
    display = filtered.filter(l => {
      const items = (l.items || []).join(' ').toLowerCase();
      return (l.name || '').toLowerCase().includes(searchQuery)
        || (l.address || '').toLowerCase().includes(searchQuery)
        || (l.location || '').toLowerCase().includes(searchQuery)
        || (l.notes || '').toLowerCase().includes(searchQuery)
        || items.includes(searchQuery)
        || (l.type || '').toLowerCase().includes(searchQuery);
    });
  }
  count.innerHTML = `<span>${display.length}</span> location${display.length !== 1 ? 's' : ''} found`;

  if (!display.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🗺️</div>
        <h3>No locations found</h3>
        <p>There are no listings matching your filters right now.<br>Check back soon — community members are adding locations.</p>
        <a href="malama-want-help.html" class="empty-btn">I want to help — add a listing</a>
      </div>`;
    return;
  }

  container.innerHTML = display.map(l => {
    const rawItems = l.items || [];
    const givingItems = rawItems.filter(i => i.startsWith('GIVING:')).map(i => i.replace('GIVING:','')).slice(0,5);
    const acceptingItems = rawItems.filter(i => i.startsWith('ACCEPTING:')).map(i => i.replace('ACCEPTING:','')).slice(0,5);
    const plainItems = rawItems.filter(i => !i.startsWith('GIVING:') && !i.startsWith('ACCEPTING:')).slice(0,5);
    const showItems = givingItems.length ? givingItems : plainItems;
    const expHrs = Math.max(0, Math.round((new Date(l.expires_at) - new Date()) / 3600000));
    return `
    <div class="listing-card" onclick="window.open('malama-listing.html?id=${l.id}','_self')" style="border-top:4px solid ${(()=>{const t=(l.type||'').split(',')[0].trim();return t==='donation_dropoff'?'var(--gold)':t==='volunteer_event'?'#7b5ea7':t==='shelter'?'var(--blue)':t==='medical_assistance'?'var(--red)':'var(--sage)'})()};">
      <div class="lc-header">
        <div>
          <p class="lc-name">${escapeHtml(l.name)}</p>
          ${l.location ? `<p style="font-size:0.72rem;font-weight:700;color:var(--sage);margin-bottom:2px;">📍 ${escapeHtml(l.location)}</p>` : ''}
          <p class="lc-addr">${escapeHtml(l.address)}</p>
        </div>
        <div class="lc-badges">
          <span class="pill ${l.status ? 'pill-open' : 'pill-closed'}">${l.status ? 'Active' : 'Inactive'}</span>
          ${(l.type||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="pill ${t==='shelter'?'pill-shelter':t==='medical_assistance'?'pill-medical':t==='donation_dropoff'?'pill-dropoff':t==='volunteer_event'?'pill-event':t==='skills_labor'?'pill-skills':'pill-supply'}">${TYPE_LABELS[t]||t}</span>`).join(' ')}
          ${l.verified ? `<span class="pill" style="background:var(--blue-pale);color:var(--blue-deep);">✓ Verified Org</span>` : ''}${l.nonprofit ? `<span class="pill" style="background:#f3eeff;color:#5b3e8a;">✦ Nonprofit</span>` : ''}
        </div>
      </div>
      <div class="lc-body">
        ${(l.type||'').split(',').map(s=>s.trim()).includes('shelter') ? `
        <div class="shelter-info">
          ${l.capacity ? `<span class="shelter-badge">👥 Capacity: ${l.capacity}</span>` : ''}
          ${l.pet_friendly ? `<span class="shelter-badge">🐾 Pet friendly</span>` : ''}
        </div>` : ''}
        ${showItems.length ? `<div class="lc-tags">${showItems.map(i=>`<span class="lc-tag">${escapeHtml(i)}</span>`).join('')}${rawItems.length > 5 ? `<span class="lc-tag" style="background:#f0f0ec;color:var(--text-muted);">+${rawItems.length-5} more</span>` : ''}</div>` : ''}
        <div class="lc-meta">
          ${l.hours ? `<span class="lc-meta-item">🕐 ${escapeHtml(l.hours)}</span>` : ''}
          ${l.contact_phone ? `<span class="lc-meta-item">📞 ${escapeHtml(l.contact_phone)}</span>` : ''}
        </div>
        ${l.notes ? `<p class="lc-notes">${escapeHtml(l.notes)}</p>` : ''}
        <div class="lc-actions" onclick="event.preventDefault();event.stopPropagation();">
          ${l.address ? `<a href="https://maps.google.com/?q=${l.lat&&l.lng?l.lat+','+l.lng:encodeURIComponent(l.address)}" target="_blank" class="lc-btn btn-dir">Take me there</a>` : ''}
          ${l.website ? `<a href="${escapeHtml(l.website.startsWith('http')?l.website:'https://'+l.website)}" target="_blank" class="lc-btn" style="color:var(--blue);background:var(--blue-pale);border-color:var(--blue-light);">Website</a>` : ''}
        </div>
        <button class="share-card-btn" data-id="${l.id}" onclick="event.preventDefault();event.stopPropagation();handleShare(this,'${l.id}')">
          <svg viewBox="0 0 20 20" fill="none" style="width:15px;height:15px;"><path d="M15 7l-5-5-5 5M10 2v11M4 13v3a2 2 0 002 2h8a2 2 0 002-2v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Share this listing
        </button>
      </div>
    </div>`;
  }).join('');
}

async function handleShare(btn, id) {
  const l = filtered.find(x => x.id === id) || allListings.find(x => x.id === id);
  if (!l) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = 'Generating image…';
  try {
    await shareListingCard(l, 'need');
  } catch(e) {
    const url = 'https://malamamap.org/malama-listing.html?id=' + id;
    navigator.clipboard.writeText(url).then(() => { btn.textContent = 'Link copied!'; });
  }
  setTimeout(() => { btn.disabled = false; btn.innerHTML = orig; }, 2000);
}

function focusOnMap(id) {
  const l = filtered.find(x => x.id === id);
  if (!l) return;
  switchView('map', document.querySelectorAll('.view-btn')[1]);
  setTimeout(() => {
    if (map) { map.panTo({lat:l.lat,lng:l.lng}); map.setZoom(15); }
  }, 300);
}

function switchView(v, el) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('listView').style.display = v==='list' ? 'block' : 'none';
  document.getElementById('mapView').style.display = v==='map' ? 'block' : 'none';
  if (v === 'map' && !mapReady) initMap();
}

function openMapSheet(l) {
  const sheet = document.getElementById('mapSheet');
  const color = !l.status ? '#888' : (TYPE_COLORS[l.type] || '#3a7d5c');
  const label = (l.type||'').split(',').map(t=>TYPE_LABELS[t.trim()]||t.trim()).join(', ');
  sheet.innerHTML = `
    <div style="position:relative;padding:0.9rem 0 0.4rem;">
      <div style="width:36px;height:4px;background:#ddd;border-radius:2px;position:absolute;left:50%;transform:translateX(-50%);top:10px;"></div>
      <button onclick="closeMapSheet()" style="position:absolute;right:0;top:4px;background:none;border:none;font-size:1.4rem;color:#aaa;cursor:pointer;line-height:1;">×</button>
    </div>
    <div style="padding-bottom:1rem;">
      <div style="display:inline-block;background:${color};color:white;font-size:0.72rem;font-weight:700;padding:2px 10px;border-radius:100px;margin-bottom:0.5rem;">${escapeHtml(label||'Other')}</div>
      <h3 style="margin:0 0 0.3rem;font-size:1.05rem;font-weight:800;color:#1a2e1a;">${escapeHtml(l.name||'')}</h3>
      ${l.location ? `<p style="margin:0 0 0.8rem;font-size:0.82rem;color:#666;">📍 ${escapeHtml(l.location)}</p>` : '<div style="margin-bottom:0.8rem;"></div>'}
      <a href="malama-listing.html?id=${encodeURIComponent(l.id)}" style="display:inline-block;background:#3a7d5c;color:white;font-weight:700;font-size:0.85rem;padding:0.5rem 1.2rem;border-radius:100px;text-decoration:none;">View full listing →</a>
    </div>`;
  sheet.style.display = 'block';
  requestAnimationFrame(() => sheet.classList.add('open'));
}

function closeMapSheet() {
  const sheet = document.getElementById('mapSheet');
  sheet.classList.remove('open');
  setTimeout(() => { sheet.style.display = 'none'; }, 300);
}

function renderMarkers() {
  markers.forEach(m => m.map = null);
  markers = [];
  if (!window._AME) return;
  filtered.forEach(l => {
    const color = !l.status ? '#888' : (TYPE_COLORS[l.type] || '#3a7d5c');
    const label = (l.type||'').split(',').map(t=>TYPE_LABELS[t.trim()]||t.trim()).join(', ');
    const w = Math.max(80, label.length * 7 + 30);
    const el = document.createElement('div');
    el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="34" style="cursor:pointer">
      <rect x="1" y="1" width="${w-2}" height="24" rx="12" fill="${color}"/>
      <text x="${w/2}" y="17" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="white">${l.status ? label : 'Inactive'}</text>
      <polygon points="${w/2-5},25 ${w/2},32 ${w/2+5},25" fill="${color}"/>
    </svg>`;
    el.title = escapeHtml(l.name) + (l.location ? ' — ' + escapeHtml(l.location) : '');
    const marker = new window._AME({position:{lat:l.lat,lng:l.lng},map,title:escapeHtml(l.name),content:el,zIndex:l.status?10:5});
    marker.addListener('click', () => openMapSheet(l));
    markers.push(marker);
  });
}

async function initMap() {
  if (mapReady) return;
  const {Map} = await google.maps.importLibrary('maps');
  const {AdvancedMarkerElement} = await google.maps.importLibrary('marker');
  window._AME = AdvancedMarkerElement;
  map = new Map(document.getElementById('map'), {
    center:{lat:21.3750,lng:-157.9600}, zoom:11, mapId:'malama_need',
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    styles:[
      {featureType:'water',elementType:'geometry',stylers:[{color:'#a8c8e0'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#d8e4cc'}]},
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'poi.business',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]}
    ]
  });
  map.addListener('click', () => closeMapSheet());
  mapReady = true;
  renderMarkers();
}

init();
