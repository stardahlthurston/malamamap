<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mālama Map — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage: #3a7d5c; --sage-deep: #275c42; --sage-pale: #edf7f1;
  --blue: #2a6496; --cream: #fdf8f2;
  --text-dark: #1c1a18; --text-muted: #8a827a;
  --border: rgba(0,0,0,0.1); --red: #c0392b; --red-pale: #fdf0ee;
}
body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.card { background: white; border-radius: 20px; border: 1px solid var(--border); padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 800; color: var(--sage-deep); text-align: center; margin-bottom: 0.25rem; }
.logo-sub { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--blue); text-align: center; margin-bottom: 2rem; }

.tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 1.5rem; }
.tab-btn {
  flex: 1; padding: 0.65rem 1rem; font-size: 0.85rem; font-weight: 700;
  text-align: center; background: none; border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; cursor: pointer; color: #aaa; font-family: 'Nunito', sans-serif;
  transition: color 0.2s;
}
.tab-btn.active { color: var(--sage-deep); border-bottom-color: var(--sage); }

.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
.field input { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #ddd; border-radius: 10px; font-size: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 500; color: var(--text-dark); background: white; }
.field input:focus { outline: none; border-color: var(--sage); }

.extra { display: none; }
.extra.show { display: block; }

.submit-btn { width: 100%; padding: 0.85rem; background: var(--sage); color: white; border: none; border-radius: 100px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; font-family: 'Nunito', sans-serif; transition: background 0.2s; }
.submit-btn:hover { background: var(--sage-deep); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.msg { font-size: 0.82rem; font-weight: 600; text-align: center; padding: 0.65rem 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
.msg.error { background: var(--red-pale); color: var(--red); display: block; }
.msg.success { background: var(--sage-pale); color: var(--sage-deep); display: block; }

.back { display: block; text-align: center; margin-top: 1.25rem; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-decoration: none; }
.back:hover { color: var(--sage); }
</style>
</head>
<body>
<div class="card">
  <p class="logo">Mālama Map</p>
  <p class="logo-sub">Hawaiʻi helping Hawaiʻi</p>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="show('login')">Log in</button>
    <button class="tab-btn" id="tab-signup" onclick="show('signup')">Create account</button>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@email.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="extra" id="extraFields">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <div class="field">
        <label>First name</label>
        <input type="text" id="firstName" placeholder="Kai">
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lastName" placeholder="Akana">
      </div>
    </div>
    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="phone" placeholder="(808) 555-0000">
    </div>
    <div class="field">
      <label>Organization name <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.8rem;">(or type "Personal")</span></label>
      <input type="text" id="orgName" placeholder="Kaimana Church / Personal">
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleAuth()">Log in</button>
  <div class="msg" id="msg"></div>
  <a href="index.html" class="back">← Back to Mālama Map</a>
</div>

<script>
// Tab switching — totally independent, runs right away
var currentMode = 'login';

function show(mode) {
  currentMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('extraFields').classList.toggle('show', mode === 'signup');
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'Log in' : 'Create account';
  document.getElementById('msg').className = 'msg';
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://wvplmqmqlnftlpyrqnle.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cGxtcW1xbG5mdGxweXJxbmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgyMDIsImV4cCI6MjA4OTc4NDIwMn0.r5GLgPk-xywtkQdrmTAFcKZny1-Wrh8b5YezAHmU9yU';
var sb;

window.addEventListener('load', function() {
  sb = window.supabase.createClient(SURL, SKEY);
  sb.auth.getSession().then(function(r) {
    if (r.data && r.data.session) window.location.href = 'malama-portal.html';
  });
});

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function handleAuth() {
  if (!sb) { showMsg('Still loading, please try again', 'error'); return; }
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Please wait…';

  if (currentMode === 'login') {
    var r = await sb.auth.signInWithPassword({ email: email, password: password });
    if (r.error) { showMsg(r.error.message, 'error'); btn.disabled=false; btn.textContent='Log in'; return; }
    showMsg('Welcome back! Redirecting…', 'success');
    setTimeout(function(){ window.location.href = 'malama-portal.html'; }, 1000);
  } else {
    var first = document.getElementById('firstName').value.trim();
    var last = document.getElementById('lastName').value.trim();
    var full = (first + ' ' + last).trim();
    var phone = document.getElementById('phone').value.trim();
    var org = document.getElementById('orgName').value.trim();
    var r = await sb.auth.signUp({ email: email, password: password, options: { data: { full_name: full, first_name: first, last_name: last, phone: phone, org_name: org } } });
    if (r.error) { showMsg(r.error.message, 'error'); btn.disabled=false; btn.textContent='Create account'; return; }
    // If email confirmation is off, session exists immediately
    if (r.data && r.data.session) {
      showMsg('Welcome to Mālama Map! Redirecting…', 'success');
      setTimeout(function(){ window.location.href = 'malama-portal.html'; }, 1000);
    } else {
      showMsg('Account created! You can log in now.', 'success');
      setTimeout(function(){ show('login'); }, 1500);
    }
    btn.disabled=false; btn.textContent='Create account';
  }
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') handleAuth(); });
</script>
