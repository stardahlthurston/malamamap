<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Preview — Listing Update Notification</title>
<style>
  body { margin: 0; padding: 0; background: #e8eae8; font-family: Arial, sans-serif; }
  .toolbar {
    background: #1a3d2b; color: white; padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    font-size: 13px; position: sticky; top: 0; z-index: 100;
  }
  .toolbar strong { font-size: 14px; }
  .toolbar-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .toolbar select, .toolbar input {
    padding: 5px 10px; border-radius: 6px; border: none; font-size: 12px;
    background: rgba(255,255,255,0.15); color: white; outline: none; cursor: pointer;
  }
  .toolbar select option { background: #1a3d2b; color: white; }
  .toolbar input::placeholder { color: rgba(255,255,255,0.5); }
  .btn-send-test {
    padding: 7px 16px; background: #3a7d5c; color: white; border: none;
    border-radius: 100px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .btn-send-test:hover { background: #4a9d72; }
  .btn-send-test:disabled { background: #666; cursor: default; }
  .send-status { font-size: 12px; color: rgba(255,255,255,0.8); }

  .preview-wrap { max-width: 680px; margin: 32px auto; padding: 0 16px 60px; }
  .meta-bar {
    background: white; border-radius: 10px 10px 0 0; padding: 14px 20px;
    border-bottom: 1px solid #e0e4e0; font-size: 13px; color: #555;
  }
  .meta-bar table { border-collapse: collapse; width: 100%; }
  .meta-bar td { padding: 3px 0; vertical-align: top; }
  .meta-bar td:first-child { color: #999; width: 60px; font-size: 12px; padding-right: 12px; }
  .meta-bar td strong { color: #1a1a1a; }

  /* Email body rendered exactly as Resend sends it */
  .email-body { background: white; border-radius: 0 0 10px 10px; overflow: hidden; }
</style>
</head>
<body>

<div class="toolbar">
  <strong>📧 Email Preview — Listing Update Notification</strong>
  <div class="toolbar-controls">
    <select id="catSelect" onchange="refreshPreview()">
      <option value="hours">Hours / Schedule update</option>
      <option value="items" selected>Items or needs updated</option>
      <option value="type">Listing type changed</option>
      <option value="contact">Contact info updated</option>
      <option value="notes">Notes / description edited</option>
      <option value="hub_badge">Fully Stocked Hub badge added</option>
      <option value="custom">Custom message</option>
    </select>
    <input type="text" id="summaryInput" placeholder="Admin note (optional)" value="Updated the items list on your listing based on the latest post." oninput="refreshPreview()" style="width:260px;">
    <button class="btn-send-test" onclick="sendTestEmail()">Send test to my email →</button>
    <span class="send-status" id="sendStatus"></span>
  </div>
</div>

<div class="preview-wrap">
  <div class="meta-bar">
    <table>
      <tr><td>From</td><td><strong>Mālama Map</strong> &lt;noreply@malamamap.org&gt;</td></tr>
      <tr><td>To</td><td><strong>listing.owner@example.com</strong></td></tr>
      <tr><td>Subject</td><td id="metaSubject"><strong>Your listing was updated — Kahului Community Hub</strong></td></tr>
    </table>
  </div>
  <div class="email-body" id="emailBody"></div>
</div>

<script>
const LISTING_NAME = 'Kahului Community Hub';
const LISTING_ID   = 'example-id-123';

const CATEGORY_LABELS = {
  hours:    'Hours / Schedule update',
  items:    'Items or needs updated',
  type:     'Listing type changed',
  contact:  'Contact info updated',
  notes:    'Notes / description edited',
  hub_badge:'Fully Stocked Hub badge added',
  custom:   'Update from the Mālama Map team',
};

function buildEmailHtml(categoryLabel, summary) {
  const reportUrl = `https://www.malamamap.org/malama-report-update.html?listing_id=${encodeURIComponent(LISTING_ID)}&listing_name=${encodeURIComponent(LISTING_NAME)}&category_label=${encodeURIComponent(categoryLabel)}`;
  const listingUrl = `https://www.malamamap.org/malama-listing.html?id=${LISTING_ID}`;

  return `
<div style="font-family:'Helvetica Neue',Arial,sans-serif;max-width:600px;margin:0 auto;background:#f4f6f4;padding:32px 20px;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1a3d2b,#3a7d5c);border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:20px;">
    <h1 style="color:white;font-size:22px;margin:0 0 6px;font-family:Georgia,serif;">Mālama Map</h1>
    <p style="color:rgba(255,255,255,0.6);font-size:11px;margin:0;letter-spacing:0.12em;text-transform:uppercase;">Listing Update</p>
  </div>

  <!-- Main card -->
  <div style="background:white;border-radius:16px;padding:28px 24px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.06);">
    <h2 style="font-size:17px;color:#1a1a1a;margin:0 0 6px;">Your listing was updated</h2>
    <p style="font-size:14px;color:#6b7a6b;margin:0 0 22px;line-height:1.55;">The Mālama Map team made a change to <strong style="color:#1a1a1a;">${LISTING_NAME}</strong>.</p>

    <!-- Category badge -->
    <div style="background:#edf7f1;border-left:4px solid #3a7d5c;border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:${summary ? '14px' : '22px'};">
      <p style="font-size:11px;font-weight:700;color:#3a7d5c;text-transform:uppercase;letter-spacing:0.09em;margin:0 0 5px;">What changed</p>
      <p style="font-size:15px;font-weight:700;color:#1a3d2b;margin:0;">${categoryLabel}</p>
    </div>

    ${summary ? `
    <!-- Admin note -->
    <div style="background:#f8f8f6;border-radius:10px;padding:14px 18px;margin-bottom:22px;">
      <p style="font-size:12px;font-weight:700;color:#8a827a;text-transform:uppercase;letter-spacing:0.07em;margin:0 0 6px;">Note from the team</p>
      <p style="font-size:14px;color:#1a1a1a;line-height:1.65;margin:0;">${summary}</p>
    </div>` : ''}

    <!-- View listing CTA -->
    <div style="text-align:center;margin-bottom:24px;">
      <a href="${listingUrl}" style="display:inline-block;background:#3a7d5c;color:white;text-decoration:none;padding:13px 32px;border-radius:100px;font-size:14px;font-weight:700;">View your listing →</a>
    </div>

    <!-- Divider -->
    <div style="border-top:1px solid #efefed;margin-bottom:22px;"></div>

    <!-- Report section -->
    <p style="font-size:14px;font-weight:700;color:#1a1a1a;margin:0 0 6px;">Something look wrong?</p>
    <p style="font-size:13px;color:#6b7a6b;line-height:1.6;margin:0 0 16px;">If this change is incorrect or you'd like it reversed, let us know and we'll fix it right away.</p>
    <div style="text-align:center;">
      <a href="${reportUrl}" style="display:inline-block;background:white;color:#1a3d2b;text-decoration:none;padding:11px 26px;border-radius:100px;font-size:13px;font-weight:700;border:1.5px solid #3a7d5c;">Report an issue with this update →</a>
    </div>
  </div>

  <p style="color:#aaa;font-size:11px;text-align:center;margin:0;line-height:1.6;">Mālama Map · malamamap.org<br>You're receiving this because you manage a listing on our platform.</p>
</div>`;
}

function refreshPreview() {
  const cat     = document.getElementById('catSelect').value;
  const summary = document.getElementById('summaryInput').value.trim();
  const label   = CATEGORY_LABELS[cat] || cat;

  document.getElementById('emailBody').innerHTML = buildEmailHtml(label, summary);
  document.getElementById('metaSubject').innerHTML = `<strong>Your listing was updated — ${LISTING_NAME}</strong>`;
}

async function sendTestEmail() {
  const btn    = document.querySelector('.btn-send-test');
  const status = document.getElementById('sendStatus');
  const cat    = document.getElementById('catSelect').value;
  const summary = document.getElementById('summaryInput').value.trim();

  btn.disabled = true;
  btn.textContent = 'Sending…';
  status.textContent = '';

  try {
    const resp = await fetch('/api/send-test-update-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: cat, summary })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Failed');
    status.textContent = '✅ Sent to dahlthurstonstar@gmail.com';
    btn.textContent = 'Sent ✓';
  } catch(e) {
    status.textContent = '❌ ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Send test to my email →';
  }
}

// Initial render
refreshPreview();
</script>
</body>
</html>
