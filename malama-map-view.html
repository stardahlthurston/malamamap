const ZIP_CITY = {
  "96701":"ʻAiea","96706":"ʻEwa Beach","96707":"Kapolei","96708":"Makakilo",
  "96712":"Haleʻiwa","96730":"Kahuku","96734":"Kailua","96744":"Kāneʻohe",

  "96818":"Āliamanu","96819":"Kalihi","96821":"Aina Haina","96822":"Mānoa",
  "96825":"Hawaiʻi Kai","96826":"Mōʻiliʻili","96853":"Kahala","96862":"Royal Kunia"
};

async function loadListingsFromDB() {
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data, error } = await sb.from('listings').select('*').eq('status', true);
  if (error || !data) return [];
  return data.map(l => {
    // Extract city from address if no location saved yet
    let loc = l.location || '';
    if (!loc && l.address) {
      const zip = (l.address.match(/96\d{3}/) || [])[0];
      if (zip) loc = ZIP_CITY[zip] || '';
      if (!loc) {
        const m = l.address.match(/,\s*([^,]+),\s*HI/i);
        if (m) loc = m[1].trim().replace(/\s*\d{5}.*/, '');
      }
    }
    return {
      id: l.id, name: l.name, type: l.type, open: l.status, verified: l.verified,
      address: l.address, location: loc, hours: l.hours || 'See listing',
      categories: l.categories || [], items: Array.isArray(l.items) ? l.items : [],
      notes: l.notes || '', website: l.website || '', givingUrl: l.giving_url || '',
      lat: l.lat, lng: l.lng, user_id: l.user_id
    };
  });
}

const sampleListings = [
  { id:1, name:"Kaimana Community Church", type:"donation_dropoff", open:true, verified:true, location:"Nuuanu", address:"1842 Nuuanu Ave, Honolulu, HI 96817", hours:"9:00 AM – 5:00 PM", categories:["food","clothing","baby"], items:["Canned food","Water","Diapers","Hygiene kits","Blankets"], notes:"Drive-through drop-off in back lot.", website:"kaimanacc.org", givingUrl:"kaimanacc.org/give", lat:21.3213, lng:-157.8426 },
  { id:2, name:"LDS Church — Kailua", type:"supply_station", open:true, verified:true, location:"Kailua", address:"261 Iliaina St, Kailua, HI 96734", hours:"7:00 AM – 6:00 PM", categories:["gas"], items:["Free gasoline"], notes:"Bring your own container. Limit 5 gallons.", website:"", givingUrl:"", lat:21.4023, lng:-157.7394 },
  { id:3, name:"Hawaiʻi Red Cross — Pearl City", type:"donation_dropoff", open:true, verified:true, location:"Pearl City", address:"776 California Ave, Pearl City, HI 96782", hours:"8:00 AM – 8:00 PM", categories:["food","clothing","baby","cash"], items:["All supplies","Monetary donations"], notes:"Largest collection point. Monetary donations preferred.", website:"hawaiiredcross.org", givingUrl:"hawaiiredcross.org/donate", lat:21.3975, lng:-157.9730 },
  { id:4, name:"Waikīkī Relief Station", type:"supply_station", open:true, verified:true, location:"Waikīkī", address:"301 Saratoga Rd, Waikīkī, HI 96815", hours:"Open 24 hours", categories:["food","shelter","baby"], items:["Water","MREs","Emergency shelter info","Baby supplies"], notes:"Run by city emergency services.", website:"honolulu.gov", givingUrl:"", lat:21.2793, lng:-157.8306 }
];

let listings = [...sampleListings];
let activeFilter = 'all';
let visibleListings = [...listings];
let map, markers = [], selectedId = null;

const TYPE_COLORS = {
  shelter:'#2a6496', supply_station:'#3a7d5c', donation_dropoff:'#c9983a',
  volunteer_event:'#7b5ea7', medical_assistance:'#c0392b', skills_labor:'#2e6b6b',
  giving:'#3a7d5c', accepting:'#2a6496'
};
const TYPE_LABELS = {
  shelter:'🏠 Shelter', supply_station:'🛖 Supply Station', donation_dropoff:'📦 Drop-Off',
  volunteer_event:'🙋 Volunteers Needed', medical_assistance:'🏥 Medical',
  skills_labor:'🔧 Skills', giving:'Giving', accepting:'Accepting'
};
const NEEDS_TYPES = ['donation_dropoff','accepting'];

function createPinElement(l) {
  const color = !l.open ? '#888' : (TYPE_COLORS[l.type] || '#3a7d5c');
  const label = l.location || (!l.open ? 'Closed' : (TYPE_LABELS[l.type] || l.type));
  const w = Math.max(70, label.length * 7 + 30);
  const el = document.createElement('div');
  el.style.cssText = 'cursor:pointer;';
  el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="34">
    <rect x="1" y="1" width="${w-2}" height="24" rx="12" fill="${color}"/>
    <circle cx="12" cy="13" r="3.5" fill="rgba(255,255,255,0.9)"/>
    <text x="20" y="17" font-family="Nunito,sans-serif" font-size="9.5" font-weight="700" fill="white" letter-spacing="0.2">${label}</text>
    <polygon points="${w/2-5},25 ${w/2},32 ${w/2+5},25" fill="${color}"/>
  </svg>`;
  return el;
}

async function initMap() {
  const {Map} = await google.maps.importLibrary("maps");
  const {AdvancedMarkerElement} = await google.maps.importLibrary("marker");
  window._AdvancedMarker = AdvancedMarkerElement;

  const mapStyles = [
    {featureType:"water",elementType:"geometry",stylers:[{color:"#a8c8e0"}]},
    {featureType:"landscape",elementType:"geometry",stylers:[{color:"#d8e4cc"}]},
    {featureType:"road.highway",elementType:"geometry",stylers:[{color:"#ffffff"},{weight:1.5}]},
    {featureType:"road.arterial",elementType:"geometry",stylers:[{color:"#f5f2eb"}]},
    {featureType:"poi.park",elementType:"geometry",stylers:[{color:"#c8d8b0"}]},
    {featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},
    {featureType:"poi.business",stylers:[{visibility:"off"}]},
    {featureType:"transit",stylers:[{visibility:"off"}]},
    {featureType:"administrative.locality",elementType:"labels.text.fill",stylers:[{color:"#5a6050"}]},
    {featureType:"administrative.locality",elementType:"labels.text.stroke",stylers:[{color:"#ffffff"},{weight:2}]}
  ];

  map = new Map(document.getElementById("map"), {
    center:{lat:21.3750,lng:-157.9600}, zoom:11,
    styles:mapStyles, mapId:"malama_map_id",
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false
  });

  try {
    const dbListings = await loadListingsFromDB();
    if (dbListings.length > 0) { listings = dbListings; visibleListings = [...listings]; }
  } catch(e) { console.log('Using sample data'); }

  renderMarkers();
  renderCards();
}

function renderMarkers() {
  markers.forEach(m => m.map = null);
  markers = [];
  const AME = window._AdvancedMarker;
  if (!AME) { setTimeout(renderMarkers, 300); return; }

  visibleListings.forEach(l => {
    if (!l.lat || !l.lng) return;
    const marker = new AME({
      position:{lat:l.lat, lng:l.lng}, map, title:l.name,
      content:createPinElement(l), zIndex:l.open ? 10 : 5
    });
    marker.addListener('click', () => {
      selectedId = l.id; closePanel(); showPopup(l);
      map.panTo({lat:l.lat, lng:l.lng});
    });
    markers.push(marker);
  });

  document.getElementById('resultChip').textContent =
    `${visibleListings.length} listing${visibleListings.length !== 1 ? 's' : ''} near you`;
}

// ── BUILD CARD — clicking anywhere opens detail page ──
function buildCard(l, inPopup) {
  const isNeed = NEEDS_TYPES.includes(l.type);
  const typeLabel = TYPE_LABELS[l.type] || l.type;
  const itemsToShow = l.items.map(i => i.replace(/^(GIVING|ACCEPTING):/,'')).slice(0,5);
  const moreCount = l.items.length - 5;
  const detailUrl = `malama-listing.html?id=${l.id}`;

  return `
    <div style="${inPopup ? 'cursor:default;' : ''}">
      <div class="lc-header">
        <div class="lc-left">
          <p class="lc-name">${l.name}</p>
          ${l.location ? `<p class="lc-area">📍 ${l.location}</p>` : ''}
          <p class="lc-addr">
            <svg viewBox="0 0 11 11" fill="none"><path d="M5.5 1.5C4.1 1.5 3 2.6 3 4c0 2 2.5 4.5 2.5 4.5S8 6 8 4c0-1.4-1.1-2.5-2.5-2.5z" stroke="currentColor" stroke-width="1.2"/></svg>
            ${l.address}
          </p>
        </div>
        <div class="lc-badges">
          <span class="pill ${l.open ? 'pill-open' : 'pill-closed'}">${l.open ? 'Open' : 'Closed'}</span>
          <span class="pill pill-type">${typeLabel}</span>
          ${l.verified ? `<span class="pill pill-verified">✓ Verified</span>` : ''}
        </div>
      </div>
      <div class="lc-body">
        <div class="lc-tags">
          ${itemsToShow.map(i => `<span class="lc-tag ${isNeed ? 'need' : ''}">${i}</span>`).join('')}
          ${moreCount > 0 ? `<span class="lc-tag" style="background:#f0f0ec;color:var(--text-muted);">+${moreCount} more</span>` : ''}
        </div>
        <div class="lc-meta">
          <span class="lc-meta-item">
            <svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5v3l2 1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
            ${l.hours}
          </span>
        </div>
        ${l.notes ? `<p class="lc-notes">${l.notes}</p>` : ''}
        <div class="lc-actions">
          <a href="https://maps.google.com/?q=${l.lat && l.lng ? l.lat+','+l.lng : encodeURIComponent(l.address)}" target="_blank" class="lc-btn btn-directions" onclick="event.stopPropagation()">
            <svg viewBox="0 0 14 14" fill="none" style="width:11px;height:11px;"><path d="M7 1l5 5-5 5M2 6h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Take me there
          </a>
          ${l.givingUrl ? `<a href="https://${l.givingUrl}" target="_blank" class="lc-btn btn-give" onclick="event.stopPropagation()">Donate online</a>` : ''}
          ${l.website ? `<a href="https://${l.website}" target="_blank" class="lc-btn btn-web" onclick="event.stopPropagation()">Website</a>` : ''}
        </div>

      </div>
    </div>
  `;
}

function renderCards() {
  const scroll = document.getElementById('panelScroll');
  document.getElementById('panelCount').innerHTML =
    `${visibleListings.length} listings <span>near you</span>`;
  if (!visibleListings.length) {
    scroll.innerHTML = `<div style="text-align:center;padding:2.5rem 1rem;color:var(--text-muted);">
      <div style="font-size:1.8rem;margin-bottom:0.75rem;">🗺️</div>
      <p style="font-weight:700;color:var(--text-mid);margin-bottom:0.4rem;">No listings match your filters</p>
      <p style="font-size:0.82rem;">Try a different area or remove a filter.</p>
    </div>`; return;
  }
  scroll.innerHTML = visibleListings.map(l => `
    <a class="listing-card" href="malama-listing.html?id=${l.id}" style="display:block;text-decoration:none;color:inherit;">
      ${buildCard(l, false)}
    </a>`).join('');
}

function showPopup(l) {
  document.getElementById('popupContent').innerHTML = `
    <div>
      ${buildCard(l, true)}
      <a href="malama-listing.html?id=${l.id}"
        style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
               padding:0.85rem;margin-top:0.5rem;margin-bottom:0.5rem;
               background:var(--sage);color:white;border-radius:100px;
               font-size:0.85rem;font-weight:700;font-family:'Nunito',sans-serif;
               text-decoration:none;letter-spacing:0.02em;cursor:pointer;">
        See full listing &amp; details
        <svg viewBox="0 0 14 14" fill="none" style="width:13px;height:13px;flex-shrink:0;">
          <path d="M3 7h8M7 3l4 4-4 4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>`;
  document.getElementById('pinPopup').classList.add('open');
}
function closePopup() { document.getElementById('pinPopup').classList.remove('open'); selectedId = null; }

function openPanel() { closePopup(); document.getElementById('listingPanel').classList.add('open'); }
function closePanel() { document.getElementById('listingPanel').classList.remove('open'); }

function focusListing(id) {
  const l = listings.find(x => String(x.id) === String(id));
  if (!l) return;
  if (l.lat && l.lng) { map.panTo({lat:l.lat, lng:l.lng}); map.setZoom(14); }
  closePanel(); showPopup(l);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterListings();
}

function filterListings() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const openOnly = document.getElementById('openOnly').checked;
  const areaFilter = document.getElementById('areaFilter').value;

  // Style the area select
  const areaEl = document.getElementById('areaFilter');
  areaEl.classList.toggle('active', !!areaFilter);

  visibleListings = listings.filter(l => {
    if (activeFilter !== 'all' && l.type !== activeFilter) return false;
    if (openOnly && !l.open) return false;
    if (areaFilter && l.location !== areaFilter) return false;
    if (q && !l.name.toLowerCase().includes(q) && !l.address.toLowerCase().includes(q) && !(l.location||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if (map) renderMarkers();
  renderCards();
}

function switchView(v, el) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  v === 'list' ? openPanel() : closePanel();
}
</script>
