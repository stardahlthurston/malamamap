<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mālama Map — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--sage:#3a7d5c;--sage-deep:#275c42;--sage-pale:#edf7f1;--text-dark:#1c1a18;--text-muted:#8a827a;--border:rgba(0,0,0,0.1);--red:#c0392b;--red-pale:#fdf0ee;}
body{font-family:'Nunito',sans-serif;background:#f4f6f4;color:var(--text-dark);min-height:100vh;}
.topbar{background:var(--sage-deep);padding:0.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:white;text-decoration:none;}
.topbar-back{font-size:0.78rem;font-weight:700;color:white;text-decoration:none;display:flex;align-items:center;gap:4px;}
.hero{background:var(--sage-deep);padding:2rem 1.5rem 2.5rem;text-align:center;}
.hero-logo{height:72px;width:auto;margin-bottom:1rem;}
.hero-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:white;margin-bottom:0.3rem;}
.hero-sub{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.1em;text-transform:uppercase;}
.content{max-width:480px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}
.section{background:white;border-radius:14px;border:1.5px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.section-title{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage);margin-bottom:1rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.field input{width:100%;padding:0.85rem 1rem;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:500;color:var(--text-dark);background:white;-webkit-appearance:none;}
.field input:focus{outline:none;border-color:var(--sage);}
.submit-btn{width:100%;padding:1rem;background:var(--sage);color:white;border:none;border-radius:100px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background 0.2s;margin-top:0.25rem;}
.submit-btn:hover{background:var(--sage-deep);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{font-size:0.85rem;font-weight:600;text-align:center;padding:0.85rem 1rem;border-radius:10px;margin-top:1rem;display:none;}
.msg.error{background:var(--red-pale);color:var(--red);display:block;}
.msg.success{background:var(--sage-pale);color:var(--sage-deep);display:block;}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back
  </a>
  <a href="index.html" class="topbar-logo"><img src="logo.png" alt="" style="height:28px;width:auto;margin-right:6px;vertical-align:middle;">Mālama Map</a>
  <div style="width:60px;"></div>
</div>

<div class="hero">
  <img src="logo.png" alt="Mālama Map" class="hero-logo">
  <h1 class="hero-title">Mālama Map</h1>
  <p class="hero-sub">Hawaiʻi helping Hawaiʻi</p>
</div>

<div class="content">

  <div id="loadingState" class="section" style="text-align:center;padding:2rem;">
    <p style="color:var(--text-muted);font-size:0.9rem;">Verifying your reset link…</p>
  </div>

  <div id="resetForm" style="display:none;">
    <div class="section">
      <p class="section-title">Choose a new password</p>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;">Enter a new password for your Mālama Map account.</p>
      <div class="field"><label>New password</label><input type="password" id="newPassword" placeholder="At least 6 characters"></div>
      <div class="field" style="margin-bottom:0;"><label>Confirm password</label><input type="password" id="confirmPassword" placeholder="Confirm new password"></div>
    </div>
    <button class="submit-btn" id="saveBtn" onclick="savePassword()">Set new password →</button>
  </div>

  <div id="invalidState" style="display:none;">
    <div class="section" style="text-align:center;padding:2rem;">
      <p style="font-size:1.5rem;margin-bottom:0.75rem;">⚠️</p>
      <p style="font-weight:700;margin-bottom:0.5rem;">Link expired or already used</p>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1.5rem;">This reset link has expired or has already been used. Please request a new one.</p>
      <a href="malama-auth.html" style="display:inline-block;background:var(--sage);color:white;text-decoration:none;padding:0.85rem 2rem;border-radius:100px;font-size:0.9rem;font-weight:700;">Back to login →</a>
    </div>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://wvplmqmqlnftlpyrqnle.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cGxtcW1xbG5mdGxweXJxbmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgyMDIsImV4cCI6MjA4OTc4NDIwMn0.r5GLgPk-xywtkQdrmTAFcKZny1-Wrh8b5YezAHmU9yU';
var sb = window.supabase.createClient(SURL, SKEY);

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

// Supabase picks up #access_token from hash and fires PASSWORD_RECOVERY
sb.auth.onAuthStateChange(function(event, session) {
  document.getElementById('loadingState').style.display = 'none';
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('resetForm').style.display = 'block';
  } else {
    document.getElementById('invalidState').style.display = 'block';
  }
});

// Fallback: show invalid after 4s if no event fires
setTimeout(function() {
  if (document.getElementById('loadingState').style.display !== 'none') {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }
}, 4000);

async function savePassword() {
  var pw = document.getElementById('newPassword').value;
  var confirm = document.getElementById('confirmPassword').value;
  if (!pw || pw.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }
  if (pw !== confirm) { showMsg('Passwords do not match', 'error'); return; }
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  var r = await sb.auth.updateUser({ password: pw });
  if (r.error) { showMsg(r.error.message, 'error'); btn.disabled=false; btn.textContent='Set new password →'; return; }
  showMsg('✅ Password updated! Redirecting to your portal…', 'success');
  setTimeout(function(){ window.location.href = 'malama-portal.html'; }, 1500);
}
</script>
</body>
</html>
