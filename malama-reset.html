<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mālama Map — Set New Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#3a7d5c;--sage-deep:#275c42;--sage-pale:#edf7f1;
  --text-dark:#1c1a18;--text-muted:#8a827a;
  --border:rgba(0,0,0,0.1);--red:#c0392b;--red-pale:#fdf0ee;
}
body{font-family:'Nunito',sans-serif;background:#f4f6f4;color:var(--text-dark);min-height:100vh;}
.topbar{background:var(--sage-deep);padding:0.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:800;color:white;text-decoration:none;display:flex;align-items:center;gap:6px;}
.hero{background:var(--sage-deep);padding:2rem 1.5rem 2.5rem;text-align:center;}
.hero-logo{height:72px;width:auto;margin-bottom:1rem;}
.hero-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:white;margin-bottom:0.3rem;}
.hero-sub{font-size:0.82rem;font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.1em;text-transform:uppercase;}
.content{max-width:480px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}
.section{background:white;border-radius:14px;border:1.5px solid var(--border);padding:1.25rem;margin-bottom:1rem;}
.section-title{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage);margin-bottom:1rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.field input{width:100%;padding:0.85rem 1rem;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:500;color:var(--text-dark);background:white;-webkit-appearance:none;}
.field input:focus{outline:none;border-color:var(--sage);}
.submit-btn{width:100%;padding:1rem;background:var(--sage);color:white;border:none;border-radius:100px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background 0.2s;}
.submit-btn:hover{background:var(--sage-deep);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{font-size:0.85rem;font-weight:600;text-align:center;padding:0.85rem 1rem;border-radius:10px;margin-top:1rem;display:none;}
.msg.error{background:var(--red-pale);color:var(--red);display:block;}
.msg.success{background:var(--sage-pale);color:var(--sage-deep);display:block;}
#invalidSection{display:none;}
</style>
</head>
<body>

<div class="topbar">
  <div style="width:60px;"></div>
  <a href="index.html" class="topbar-logo">
    <img src="logo.png" alt="" style="height:28px;width:auto;">Mālama Map
  </a>
  <div style="width:60px;"></div>
</div>

<div class="hero">
  <img src="logo.png" alt="Mālama Map" class="hero-logo">
  <h1 class="hero-title">Mālama Map</h1>
  <p class="hero-sub">Set new password</p>
</div>

<div class="content">

  <!-- RESET FORM -->
  <div id="resetSection">
    <div class="section">
      <p class="section-title">Choose a new password</p>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1.25rem;line-height:1.6;">Enter a new password for your Mālama Map account.</p>
      <div class="field"><label>New password</label><input type="password" id="newPassword" placeholder="At least 6 characters"></div>
      <div class="field" style="margin-bottom:0;"><label>Confirm password</label><input type="password" id="confirmPassword" placeholder="Same password again"></div>
    </div>
    <button class="submit-btn" id="saveBtn" onclick="savePassword()">Save new password →</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- INVALID / EXPIRED LINK -->
  <div id="invalidSection">
    <div class="section" style="text-align:center;padding:2rem;">
      <p style="font-size:2rem;margin-bottom:0.75rem;">⏰</p>
      <p style="font-weight:700;font-size:1rem;margin-bottom:0.5rem;">This link has expired</p>
      <p style="font-size:0.85rem;color:var(--text-muted);line-height:1.6;margin-bottom:1.5rem;">Password reset links expire after 1 hour. Request a new one from the login page.</p>
      <a href="malama-auth.html" style="display:inline-block;background:var(--sage);color:white;text-decoration:none;padding:0.75rem 1.75rem;border-radius:100px;font-size:0.9rem;font-weight:700;">Back to login</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://wvplmqmqlnftlpyrqnle.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cGxtcW1xbG5mdGxweXJxbmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgyMDIsImV4cCI6MjA4OTc4NDIwMn0.r5GLgPk-xywtkQdrmTAFcKZny1-Wrh8b5YezAHmU9yU';
var sb;
var recoveryReady = false;

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

window.addEventListener('load', function() {
  sb = window.supabase.createClient(SURL, SKEY);

  // Listen for PASSWORD_RECOVERY event — Supabase exchanges the token automatically
  sb.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
    }
    if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
      recoveryReady = true;
    }
  });

  // If no recovery hash at all, show invalid page
  var hash = window.location.hash;
  if (!hash || (!hash.includes('type=recovery') && !hash.includes('access_token'))) {
    document.getElementById('resetSection').style.display = 'none';
    document.getElementById('invalidSection').style.display = 'block';
  } else {
    // Mark ready after a short delay to let Supabase exchange the token
    setTimeout(function() { recoveryReady = true; }, 1200);
  }
});

async function savePassword() {
  if (!sb) { showMsg('Still loading, please try again', 'error'); return; }
  var pw = document.getElementById('newPassword').value;
  var pw2 = document.getElementById('confirmPassword').value;
  if (!pw || pw.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }
  if (pw !== pw2) { showMsg('Passwords do not match', 'error'); return; }
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  var r = await sb.auth.updateUser({ password: pw });
  if (r.error) {
    showMsg(r.error.message, 'error');
    btn.disabled = false; btn.textContent = 'Save new password →';
    return;
  }
  showMsg('✅ Password updated! Redirecting…', 'success');
  setTimeout(function() { window.location.href = 'malama-portal.html'; }, 1500);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') savePassword();
});
</script>
</body>
</html>
