<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mālama Map — Contact</title>
<link rel="icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#3a7d5c;--sage-pale:#edf7f1;--sage-deep:#1a3d2b;
  --text-dark:#1a1a1a;--text-muted:#8a827a;
  --border:rgba(0,0,0,0.08);--red:#c0392b;
}
body{font-family:'Nunito',sans-serif;background:#f4f6f4;color:var(--text-dark);min-height:100vh;}
.topbar{background:var(--sage-deep);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800;color:white;text-decoration:none;}
.topbar-back{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.7);text-decoration:none;display:flex;align-items:center;gap:4px;}
.topbar-back:hover{color:white;}
.topbar-right{display:flex;align-items:center;gap:0.5rem;}
.topbar-btn{font-size:0.65rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:0.35rem 0.75rem;border-radius:100px;border:1.5px solid rgba(255,255,255,0.4);color:rgba(255,255,255,0.9);text-decoration:none;transition:all 0.2s;white-space:nowrap;}
.topbar-btn:hover{background:rgba(255,255,255,0.1);}
.topbar-btn.btn-add{background:rgba(255,255,255,0.12);}
@media(max-width:600px){.topbar-btn{font-size:0.6rem;padding:0.3rem 0.6rem;}}
.container{max-width:560px;margin:0 auto;padding:2.5rem 1.25rem 4rem;}
.page-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;color:var(--sage-deep);margin-bottom:0.5rem;}
.page-sub{font-size:0.88rem;color:var(--text-muted);line-height:1.6;margin-bottom:2rem;}
.form-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.5rem;}
.field{margin-bottom:1.25rem;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:0.78rem;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;}
.field label .req{color:var(--red);}
.field input,.field textarea{width:100%;padding:0.7rem 0.85rem;border:1.5px solid var(--border);border-radius:10px;font-size:0.88rem;font-family:'Nunito',sans-serif;transition:border-color 0.15s;background:white;color:var(--text-dark);}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--sage);}
.field textarea{min-height:130px;resize:vertical;line-height:1.6;}
.field .hint{font-size:0.72rem;color:var(--text-muted);margin-top:4px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:480px){.row{grid-template-columns:1fr;}}
.submit-btn{width:100%;padding:0.85rem;background:var(--sage);color:white;border:none;border-radius:100px;font-size:0.9rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s;letter-spacing:0.03em;}
.submit-btn:hover{background:var(--sage-deep);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
.success-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:2.5rem 1.75rem;text-align:center;display:none;}
.success-icon{width:56px;height:56px;background:var(--sage-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.success-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;color:var(--sage-deep);margin-bottom:0.5rem;}
.success-sub{font-size:0.85rem;color:var(--text-muted);line-height:1.6;}
.back-link{display:inline-block;margin-top:1.25rem;font-size:0.85rem;font-weight:700;color:var(--sage);text-decoration:none;}
.footer{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.72rem;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="topbar-logo">Mālama Map</a>
  <div class="topbar-right">
    <a href="malama-auth.html" class="topbar-btn btn-add">+ Add listing</a>
    <a href="malama-auth.html" class="topbar-btn">Log in</a>
  </div>
</div>

<div class="container">
  <h1 class="page-title">Get in touch</h1>
  <p class="page-sub">Have a question, suggestion, or want to help? We'd love to hear from you.</p>

  <div class="form-card" id="contactForm">
    <div class="row">
      <div class="field">
        <label>First name <span class="req">*</span></label>
        <input type="text" id="firstName" placeholder="Kai">
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" id="lastName" placeholder="Akana">
      </div>
    </div>
    <div class="field">
      <label>Email <span class="req">*</span></label>
      <input type="email" id="contactEmail" placeholder="kai@email.com">
    </div>
    <div class="field">
      <label>What can we help with? <span class="req">*</span></label>
      <textarea id="contactMessage" placeholder="Tell us what's on your mind — questions about listings, partnership ideas, feedback, or anything else."></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitContact()">Send message</button>
  </div>

  <div class="success-card" id="successCard">
    <div class="success-icon">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M6 13l5 5 9-10" stroke="#3a7d5c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <p class="success-title">Message sent!</p>
    <p class="success-sub">Mahalo for reaching out. We'll get back to you as soon as we can.</p>
    <a href="index.html" class="back-link">← Back to Mālama Map</a>
  </div>
</div>

<div class="footer">Mālama Map · malamamap.org</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://wvplmqmqlnftlpyrqnle.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cGxtcW1xbG5mdGxweXJxbmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDgyMDIsImV4cCI6MjA4OTc4NDIwMn0.r5GLgPk-xywtkQdrmTAFcKZny1-Wrh8b5YezAHmU9yU';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function submitContact() {
  const first = document.getElementById('firstName').value.trim();
  const last = document.getElementById('lastName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const message = document.getElementById('contactMessage').value.trim();

  if (!first || !email || !message) {
    alert('Please fill in your name, email, and message.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const r = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ first_name: first, last_name: last, email, message })
    });
    if (!r.ok) throw new Error('Send failed');

    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Send Message';
    alert('Something went wrong. Please try again.');
  }
}
</script>
</body>
</html>
